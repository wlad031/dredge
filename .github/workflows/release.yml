name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Build binaries
      id: build
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        REPO=$(grep 'githubRepo' cmd/dredge/main.go | grep -oP '"[^"]+"' | tr -d '"')
        BINARY_NAME=$(basename ${REPO})
        VERSION_VAR="main.version"
        MAIN_PACKAGE="./cmd/${BINARY_NAME}"
        LDFLAGS="-X ${VERSION_VAR}=${VERSION}"

        # ============================================================
        # BUILD TARGETS: Uncomment/comment platforms as needed
        # ============================================================

        # Linux (default - always included)
        GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ${BINARY_NAME}_linux_amd64 ${MAIN_PACKAGE}
        GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ${BINARY_NAME}_linux_arm64 ${MAIN_PACKAGE}
        FILES="${BINARY_NAME}_linux_amd64,${BINARY_NAME}_linux_arm64"

        # macOS (uncomment to build for Darwin)
        # GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ${BINARY_NAME}_darwin_amd64 ${MAIN_PACKAGE}
        # GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ${BINARY_NAME}_darwin_arm64 ${MAIN_PACKAGE}
        # FILES="${FILES},${BINARY_NAME}_darwin_amd64,${BINARY_NAME}_darwin_arm64"

        # Windows (uncomment to build for Windows)
        # GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o ${BINARY_NAME}_windows_amd64.exe ${MAIN_PACKAGE}
        # GOOS=windows GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o ${BINARY_NAME}_windows_arm64.exe ${MAIN_PACKAGE}
        # FILES="${FILES},${BINARY_NAME}_windows_amd64.exe,${BINARY_NAME}_windows_arm64.exe"

        echo "files=${FILES}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.build.outputs.files }}
        generate_release_notes: true
        prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}

